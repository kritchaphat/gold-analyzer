name: Gold Analyzer
on:
  workflow_dispatch: # ปุ่มกดรันเองมือ
  schedule:
    - cron: '0 7 * * 1-5' # รันอัตโนมัติ จันทร์-ศุกร์ 7 โมงเช้า (เวลา UTC)

jobs:
  analyze-gold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance anthropic
          # เปลี่ยนมาติดตั้งตรงจาก GitHub ของผู้พัฒนาเพื่อเลี่ยง Error
          pip install git+https://github.com/twopirllc/pandas-ta.git@development


      - name: Run Analysis
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python main.py
