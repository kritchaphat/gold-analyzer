name: Gold Analyzer
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1-5'

jobs:
  analyze-gold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # กรณีกันเหนียว: ถ้าหาไฟล์ไม่เจอ ให้ติดตั้งตัวหลักที่ Mini-Kronos ต้องใช้
          pip install pandas pandas-ta yfinance anthropic

      - name: Run Analysis
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python main.py
