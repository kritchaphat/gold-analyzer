name: Gold Analyzer
on:
  workflow_dispatch: # ปุ่มกดรันเองมือ
  schedule:
    - cron: '0 7 * * 1-5' # รันอัตโนมัติ จันทร์-ศุกร์ 7 โมงเช้า (เวลา UTC)

jobs:
  analyze-gold:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ติดตั้ง library หลักที่ Mini-Kronos ต้องใช้แบบบังคับไม่ใช้ Cache
          pip install pandas yfinance anthropic pandas-ta --no-cache-dir

      - name: Run Analysis
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python main.py
